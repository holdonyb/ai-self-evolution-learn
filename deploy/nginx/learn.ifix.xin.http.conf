server {
    listen 80;
    listen [::]:80;
    server_name learn.ifix.xin;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type text/plain;
        try_files $uri =404;
    }

    location / {
        return 200 "learn.ifix.xin bootstrap\n";
        add_header Content-Type text/plain;
    }
}
