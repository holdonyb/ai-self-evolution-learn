name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.18.1
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Trust deploy host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Prepare remote directories
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "mkdir -p /opt/learn-ifix/app /var/www/certbot"

      - name: Sync project files
        run: |
          rsync -az --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            --exclude ".git" \
            --exclude ".github" \
            --exclude "node_modules" \
            --exclude ".next" \
            ./ ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/opt/learn-ifix/app/

      - name: Configure server and deploy
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} <<'EOF'
          set -e

          cp /opt/learn-ifix/app/deploy/nginx/learn.ifix.xin.http.conf /etc/nginx/sites-available/learn.ifix.xin
          ln -sfn /etc/nginx/sites-available/learn.ifix.xin /etc/nginx/sites-enabled/learn.ifix.xin
          nginx -t
          systemctl reload nginx

          if [ ! -d /etc/letsencrypt/live/learn.ifix.xin ]; then
            certbot certonly --webroot -w /var/www/certbot -d learn.ifix.xin --non-interactive --agree-tos -m ${{ secrets.CERTBOT_EMAIL }}
          fi

          cp /opt/learn-ifix/app/deploy/nginx/learn.ifix.xin.conf /etc/nginx/sites-available/learn.ifix.xin

          cat > /opt/learn-ifix/app/.env.production <<ENVEOF
          ONEAPI_API_KEY=${{ secrets.ONEAPI_API_KEY }}
          ONEAPI_BASE_URL=${{ secrets.ONEAPI_BASE_URL }}
          NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}
          DOUBAO_ASR_APP_KEY=${{ secrets.DOUBAO_ASR_APP_KEY }}
          DOUBAO_ASR_ACCESS_KEY=${{ secrets.DOUBAO_ASR_ACCESS_KEY }}
          DOUBAO_ASR_STS_ENDPOINT=${{ secrets.DOUBAO_ASR_STS_ENDPOINT }}
          DOUBAO_STREAM_ASR_URL=${{ secrets.DOUBAO_STREAM_ASR_URL }}
          DOUBAO_STREAM_ASR_RESOURCE_ID=${{ secrets.DOUBAO_STREAM_ASR_RESOURCE_ID }}
          DOUBAO_STREAM_TOKEN_DURATION_SECONDS=${{ secrets.DOUBAO_STREAM_TOKEN_DURATION_SECONDS }}
          ENVEOF

          python3 - <<'PY'
          from pathlib import Path

          target_path = Path("/opt/learn-ifix/app/.env.production")
          agenthub_env_path = Path("/opt/agenthub/.env")
          fallback_mapping = {
              "DOUBAO_ASR_APP_KEY": "AGENTHUB_DOUBAO_ASR_APP_KEY",
              "DOUBAO_ASR_ACCESS_KEY": "AGENTHUB_DOUBAO_ASR_ACCESS_KEY",
              "DOUBAO_ASR_STS_ENDPOINT": "AGENTHUB_DOUBAO_ASR_STS_ENDPOINT",
              "DOUBAO_STREAM_ASR_URL": "AGENTHUB_DOUBAO_STREAM_ASR_URL",
              "DOUBAO_STREAM_ASR_RESOURCE_ID": "AGENTHUB_DOUBAO_STREAM_ASR_RESOURCE_ID",
              "DOUBAO_STREAM_TOKEN_DURATION_SECONDS": "AGENTHUB_DOUBAO_STREAM_TOKEN_DURATION_SECONDS",
          }

          def read_env_file(path: Path) -> dict[str, str]:
              if not path.exists():
                  return {}
              values: dict[str, str] = {}
              for raw_line in path.read_text(encoding="utf-8", errors="ignore").splitlines():
                  line = raw_line.strip()
                  if not line or line.startswith("#") or "=" not in line:
                      continue
                  key, value = line.split("=", 1)
                  values[key.strip()] = value.strip()
              return values

          target_env = read_env_file(target_path)
          agenthub_env = read_env_file(agenthub_env_path)
          append_lines: list[str] = []
          for target_key, source_key in fallback_mapping.items():
              if target_env.get(target_key):
                  continue
              source_value = agenthub_env.get(source_key, "").strip()
              if source_value:
                  append_lines.append(f"{target_key}={source_value}")

          if append_lines:
              with target_path.open("a", encoding="utf-8") as handle:
                  handle.write("\n" + "\n".join(append_lines) + "\n")
          PY

          cd /opt/learn-ifix/app
          npm ci --legacy-peer-deps
          rm -rf .next
          npm run build
          mkdir -p .next/standalone/.next .next/standalone/public
          cp -R .next/static .next/standalone/.next/
          cp -R public/. .next/standalone/public/
          pm2 delete learn-ifix-web || true
          pm2 start deploy/ecosystem.config.cjs --update-env
          nginx -t
          systemctl reload nginx
          EOF
